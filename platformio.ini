; PlatformIO Project Configuration File
;
; This project keeps PlatformIO primarily as a convenient wrapper around an
; Espressif IoT Development Framework (ESP-IDF) firmware build plus Serial
; Peripheral Interface Flash File System (SPIFFS) image upload workflow.
;
; The two main use cases are:
; - build/flash the ESP32 firmware with the esp32wroom32d environment
; - run uploadfs so every staged file in data/ is packed into the SPIFFS partition

[platformio]
; Default to the manual-boot target because this custom board does not
; reliably respond to PlatformIO's automatic reset pulse during uploads.
default_envs = esp32wroom32d_manual_boot

[env:esp32wroom32d]
; Use the Espressif platform with the ESP-IDF framework.
platform = espressif32
board = esp32wroom32d_n16
framework = espidf
; Keep the monitor at the ESP32 console default so ROM/app logs remain readable.
monitor_speed = 115200
; The board now flashes reliably at the ESP32 ROM bootloader default speed.
upload_speed = 115200
; Windows currently enumerates this board's Silicon Labs CP210x USB-UART bridge
; as COM5. Pin both upload and monitor to that adapter so PlatformIO does not
; drift to another stale or unrelated serial port after reconnects.
upload_port = COM5
monitor_port = COM5
; Leave the CP210x control lines inactive while monitoring. On this custom
; board, toggling DTR/RTS can accidentally retrigger reset/boot strapping.
monitor_dtr = 0
monitor_rts = 0
; Adds the custom "Stage Demo File" target to the PlatformIO user interface (UI).
extra_scripts = pre:tools/platformio_audio_targets.py
; Tell PlatformIO that filesystem uploads should build a SPIFFS image and that
; the project uses a custom partition map rather than the board defaults.
board_build.filesystem = spiffs
board_build.partitions = partitions.csv
build_flags =
    -DRF3_NODE_NAME=\"rf3-pcb\"
    -DRF3_WIFI_CONTROL_ENABLED=0
    -DRF3_NRF24_TX_CE_PULSE_US=40
    -DNRF24_CE_PIN=17
    -DNRF24_CSN_PIN=27
    -DNRF24_IRQ_PIN=16
    -DNRF24_PINSET_NAME=\"pcb\"

[env:esp32wroom32d_manual_boot]
; Inherit the normal ESP32 build but skip the automatic pre-upload reset pulse.
; This gives boards with flaky or missing auto-reset circuitry a manual BOOT
; path that still uses the same firmware, partitions, and port settings.
extends = env:esp32wroom32d
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset

[env:esp32wroom32d_devboard]
; Alternate nRF24 pinout for the older devboard wiring.
; This board uses the normal auto-reset upload flow rather than the manual
; BOOT-button path required by the custom PCB.
extends = env:esp32wroom32d
board = esp32wroom32d_4mb
upload_port = COM3
monitor_port = COM3
board_build.partitions = partitions_4mb.csv
build_flags =
    -DRF3_NODE_NAME=\"rf3-devboard\"
    -DRF3_WIFI_CONTROL_ENABLED=1
    -DNRF24_CE_PIN=27
    -DNRF24_CSN_PIN=5
    -DNRF24_IRQ_PIN=26
    -DNRF24_PINSET_NAME=\"devboard\"

[env:native]
; Native test environment used for host-side unit tests of the protocol/helper
; code that does not require ESP32 hardware.
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    +<audio_packet.cpp>
    +<audio_reassembler.cpp>
    +<nrf24.cpp>
    +<radio_manager.cpp>
    +<frame_io.cpp>
    +<morse.cpp>
    +<validation.cpp>

; If you want to build the project with the Arduino framework, use the following configuration
; [env:featheresp32]
