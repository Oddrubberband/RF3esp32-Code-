; PlatformIO Project Configuration File
;
; This project keeps PlatformIO primarily as a convenient wrapper around an
; Espressif IoT Development Framework (ESP-IDF) firmware build plus Serial
; Peripheral Interface Flash File System (SPIFFS) image upload workflow.
;
; The two main use cases are:
; - build/flash the ESP32 firmware with the esp32wroom32d environment
; - run uploadfs so every .u8 file in data/ is packed into the SPIFFS partition

[platformio]
; Default to the actual ESP32 target used by the project.
default_envs = esp32wroom32d

[env:esp32wroom32d]
; Use the Espressif platform with the ESP-IDF framework.
platform = espressif32
board = esp32dev
framework = espidf
; The fitted module is an ESP32-WROOM-32UE-N16, so advertise the correct flash
; size to the bootloader/esptool even though the current partition table uses
; only the first few megabytes.
board_upload.flash_size = 16MB
; Keep the monitor at the ESP32 console default so ROM/app logs remain readable.
monitor_speed = 115200
; Use an intentionally very slow upload rate for troubleshooting. Espressif's
; esptool docs recommend trying rates below 115200 when connectivity is flaky,
; and call out 9600 as a very slow verification value.
upload_speed = 9600
; Windows currently enumerates this board's Silicon Labs CP210x USB-UART bridge
; as COM4. Pin both upload and monitor to that adapter so PlatformIO does not
; drift to another stale or unrelated serial port after reconnects.
upload_port = COM4
monitor_port = COM4
; Adds the custom "Prepare Demo Audio" target to the PlatformIO user interface (UI).
extra_scripts = pre:tools/platformio_audio_targets.py
; Tell PlatformIO that filesystem uploads should build a SPIFFS image and that
; the project uses a custom partition map rather than the board defaults.
board_build.filesystem = spiffs
board_build.partitions = partitions.csv

[env:esp32wroom32d_manual_boot]
; Inherit the normal ESP32 build but skip the automatic pre-upload reset pulse.
; This gives boards with flaky or missing auto-reset circuitry a manual BOOT
; path that still uses the same firmware, partitions, and port settings.
extends = env:esp32wroom32d
board_upload.before_reset = no_reset
board_upload.after_reset = hard_reset

[env:native]
; Native test environment used for host-side unit tests of the protocol/helper
; code that does not require ESP32 hardware.
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    +<audio_packet.cpp>
    +<audio_reassembler.cpp>
    +<nrf24.cpp>
    +<radio_manager.cpp>
    +<frame_io.cpp>
    +<morse.cpp>
    +<validation.cpp>

; If you want to build the project with the Arduino framework, use the following configuration
; [env:featheresp32]
